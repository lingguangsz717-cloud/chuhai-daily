<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出海早班车 — 跨境卖家决策辅助平台</title>
<style>
:root {
  --paper: #faf8f5;
  --ink: #1a1a1a;
  --ink-light: #555;
  --accent: #c41e3a;
  --accent-dim: #8b1a2b;
  --border: #e0d8cc;
  --card-bg: #fff;
  --tab-active-bg: #1a1a1a;
  --tab-active-text: #fff;
  --tab-hover: #f0ebe0;
  --gold: #b8860b;
  --tag-bg: #f5f0e8;
  --shadow: 0 1px 3px rgba(0,0,0,.06);
  --shadow-lg: 0 4px 24px rgba(0,0,0,.10);
  --radius: 6px;
  --font-serif: 'Times New Roman', 'Songti SC', 'STSong', 'SimSun', 'Noto Serif CJK SC', serif;
  --font-sans: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
  --transition: 0.25s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: var(--font-sans);
  background: #ede8df;
  color: var(--ink);
  line-height: 1.6;
  min-height: 100vh;
}

/* ===== HEADER ===== */
.header {
  background: var(--card-bg);
  border-bottom: 2px solid var(--border);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.logo {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  font-weight: 900;
  letter-spacing: 0.02em;
  color: var(--ink);
  white-space: nowrap;
}
.logo .dot {
  color: var(--accent);
}
.logo-sub {
  font-size: 0.7rem;
  color: var(--ink-light);
  font-weight: 400;
  letter-spacing: 0.05em;
  display: block;
  text-transform: uppercase;
}

/* ===== REGION TABS ===== */
.region-tabs {
  display: flex;
  gap: 4px;
  background: #f5f2ec;
  border-radius: 8px;
  padding: 3px;
}
.region-tab {
  padding: 8px 18px;
  border: none;
  background: transparent;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  border-radius: 6px;
  color: var(--ink-light);
  transition: all var(--transition);
  font-family: var(--font-sans);
  white-space: nowrap;
}
.region-tab:hover {
  background: var(--tab-hover);
  color: var(--ink);
}
.region-tab.active {
  background: var(--tab-active-bg);
  color: var(--tab-active-text);
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}

/* ===== MAIN CONTENT AREA ===== */
.main-container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 28px 24px 60px;
}
.content-region {
  display: none;
  animation: fadeSlide .35s ease;
}
.content-region.active {
  display: block;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===== HERO ===== */
.hero {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 32px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--accent);
}
.hero-tag {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 3px 10px;
  border-radius: 3px;
  margin-bottom: 12px;
  text-transform: uppercase;
}
.hero h2 {
  font-family: var(--font-serif);
  font-size: 1.6rem;
  font-weight: 900;
  line-height: 1.35;
  margin-bottom: 10px;
  color: var(--ink);
}
.hero p {
  color: var(--ink-light);
  font-size: 0.95rem;
  line-height: 1.7;
  max-width: 700px;
}
.hero-meta {
  font-size: 0.75rem;
  color: #999;
  margin-top: 12px;
}

/* ===== CARD GRID ===== */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 18px;
  margin-bottom: 32px;
}
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 24px;
  box-shadow: var(--shadow);
  transition: box-shadow var(--transition), transform var(--transition);
}
.card:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-1px);
}
.card-tag {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 2px 9px;
  border-radius: 3px;
  margin-bottom: 10px;
  text-transform: uppercase;
}
.card-tag.policy    { background: #fde8ec; color: var(--accent); }
.card-tag.trend     { background: #e8f4f0; color: #1a6b4a; }
.card-tag.breakdown { background: #fef3e4; color: var(--gold); }
.card-tag.data      { background: #e8eef6; color: #2a5298; }
.card h3 {
  font-family: var(--font-serif);
  font-size: 1.1rem;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 8px;
}
.card p {
  font-size: 0.88rem;
  color: var(--ink-light);
  line-height: 1.6;
}
.card .source {
  font-size: 0.72rem;
  color: #bbb;
  margin-top: 10px;
}

/* ===== PAID SECTION ===== */
.paid-section {
  background: linear-gradient(135deg, #faf8f5 0%, #f0ead8 100%);
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 36px 32px 28px;
  text-align: center;
  margin-top: 8px;
  position: relative;
  overflow: hidden;
}
.paid-section::before {
  content: '🔒';
  position: absolute;
  top: -30px;
  right: -30px;
  font-size: 6rem;
  opacity: 0.04;
  pointer-events: none;
}
.paid-section h3 {
  font-family: var(--font-serif);
  font-size: 1.3rem;
  font-weight: 800;
  margin-bottom: 6px;
}
.paid-section .subtitle {
  font-size: 0.9rem;
  color: var(--ink-light);
  margin-bottom: 20px;
}
.paid-input-group {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.paid-input-group input {
  padding: 10px 16px;
  border: 2px solid var(--border);
  border-radius: 6px;
  font-size: 0.95rem;
  font-family: var(--font-sans);
  width: 260px;
  max-width: 100%;
  transition: border-color var(--transition);
}
.paid-input-group input:focus {
  outline: none;
  border-color: var(--accent);
}
.btn-analyze {
  padding: 10px 28px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: background var(--transition);
}
.btn-analyze:hover {
  background: var(--accent-dim);
}
.btn-analyze:disabled {
  background: #ccc;
  cursor: not-allowed;
}

/* ===== UNLOCK MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 200;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(2px);
}
.modal-overlay.show {
  display: flex;
}
.modal {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 36px 32px;
  max-width: 420px;
  width: 90%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,.18);
}
.modal h3 {
  font-family: var(--font-serif);
  font-size: 1.3rem;
  font-weight: 800;
  margin-bottom: 8px;
}
.modal p {
  font-size: 0.88rem;
  color: var(--ink-light);
  margin-bottom: 18px;
}
.modal input {
  width: 100%;
  padding: 10px 14px;
  border: 2px solid var(--border);
  border-radius: 6px;
  font-size: 0.95rem;
  text-align: center;
  font-family: var(--font-sans);
  margin-bottom: 12px;
}
.modal input:focus {
  outline: none;
  border-color: var(--accent);
}
.modal .btn-analyze {
  width: 100%;
}
.modal .close-modal {
  background: none;
  border: none;
  color: #999;
  cursor: pointer;
  font-size: 0.85rem;
  margin-top: 12px;
  text-decoration: underline;
}
.modal .error-msg {
  color: var(--accent);
  font-size: 0.82rem;
  margin-top: -6px;
  margin-bottom: 8px;
  display: none;
}
.modal .error-msg.show {
  display: block;
}

/* ===== RESULT PANEL ===== */
.result-panel {
  display: none;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 32px;
  margin-top: 20px;
  text-align: left;
  box-shadow: var(--shadow);
  animation: fadeSlide .4s ease;
}
.result-panel.show {
  display: block;
}
.result-panel h4 {
  font-family: var(--font-serif);
  font-size: 1.15rem;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--accent);
}
.result-panel .result-section {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.result-panel .result-section h5 {
  font-size: 0.85rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-light);
  margin-bottom: 6px;
}
.result-panel .result-section p,
.result-panel .result-section ul {
  font-size: 0.9rem;
  color: var(--ink);
  line-height: 1.7;
}
.result-panel ul {
  list-style: disc;
  padding-left: 20px;
}

/* ===== UNLOCKED STATE ===== */
.paid-section.unlocked {
  border: 2px solid #1a6b4a;
  background: linear-gradient(135deg, #f5faf7 0%, #e8f4ec 100%);
}
.paid-section.unlocked::before {
  content: '🔓';
}

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  padding: 24px;
  color: #bbb;
  font-size: 0.78rem;
  border-top: 1px solid var(--border);
  margin-top: 40px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 640px) {
  .header-inner {
    flex-direction: column;
    align-items: flex-start;
  }
  .region-tabs {
    width: 100%;
    overflow-x: auto;
  }
  .region-tab {
    font-size: 0.8rem;
    padding: 7px 14px;
  }
  .hero {
    padding: 20px;
  }
  .hero h2 {
    font-size: 1.3rem;
  }
  .card-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

// ===== STATE =====
let currentRegion = 'us';
let isUnlocked = false;
const UNLOCK_CODES = ['CHUHAI2026', 'ZAOBANCHE', 'TEST123'];

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  // Check if already unlocked
  const saved = localStorage.getItem('chuhai_unlocked');
  if (saved && UNLOCK_CODES.includes(saved)) {
    isUnlocked = true;
  }

  renderRegion(currentRegion);

  // Tab click
  document.getElementById('regionTabs').addEventListener('click', (e) => {
    const tab = e.target.closest('.region-tab');
    if (!tab) return;
    currentRegion = tab.dataset.region;
    document.querySelectorAll('.region-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderRegion(currentRegion);
  });

  // Close modal on overlay click
  document.getElementById('unlockModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
  });

  // Enter key in unlock input
  document.getElementById('unlockCodeInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitUnlock();
  });
});

// ===== RENDER =====
function renderRegion(region) {
  const data = REGION_DATA[region];
  if (!data) return;

  const html = `
    <!-- Hero -->
    <div class="hero">
      <span class="hero-tag">${data.hero.tag}</span>
      <h2>${data.hero.title}</h2>
      <p>${data.hero.summary}</p>
      <div class="hero-meta">${data.hero.meta}</div>
    </div>

    <!-- Cards -->
    <div class="card-grid">
      ${data.cards.map(c => `
        <div class="card">
          <span class="card-tag ${c.tag}">${c.tagLabel}</span>
          <h3>${c.title}</h3>
          <p>${c.body}</p>
          <div class="source">${c.source}</div>
        </div>
      `).join('')}
    </div>

    <!-- Paid Section -->
    ${renderPaidSection()}

    <!-- Result Panel -->
    <div class="result-panel" id="resultPanel"></div>
  `;

  document.getElementById('mainContent').innerHTML = html;

  // Re-bind events
  const analyzeBtn = document.getElementById('analyzeBtn');
  if (analyzeBtn) {
    analyzeBtn.addEventListener('click', handleAnalyzeClick);
  }
  const productInput = document.getElementById('productInput');
  if (productInput) {
    productInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleAnalyzeClick();
    });
  }
}

function renderPaidSection() {

function handleAnalyzeClick() {
  const product = document.getElementById('productInput').value.trim();
  if (!product) {
    document.getElementById('productInput').focus();
    return;
  }
  if (!isUnlocked) {
    openModal(product);
  } else {
    runAnalysis(product);
  }
}

// ===== UNLOCK FLOW =====
let pendingProduct = '';
function openModal(product) {
  pendingProduct = product;
  document.getElementById('unlockModal').classList.add('show');
  document.getElementById('unlockCodeInput').value = '';
  document.getElementById('unlockError').classList.remove('show');
  setTimeout(() => document.getElementById('unlockCodeInput').focus(), 200);
}

function closeModal() {
  document.getElementById('unlockModal').classList.remove('show');
  pendingProduct = '';
}

function submitUnlock() {
  const code = document.getElementById('unlockCodeInput').value.trim().toUpperCase();
  if (UNLOCK_CODES.includes(code)) {
    isUnlocked = true;
    localStorage.setItem('chuhai_unlocked', code);
    closeModal();
    renderRegion(currentRegion);
    // Auto-trigger analysis for the pending product
    setTimeout(() => {
      const input = document.getElementById('productInput');
      if (input) {
        input.value = pendingProduct;
        runAnalysis(pendingProduct);
      }
    }, 300);
  } else {
    document.getElementById('unlockError').classList.add('show');
    document.getElementById('unlockCodeInput').value = '';
    document.getElementById('unlockCodeInput').focus();
  }
}

    const analysis = generateAnalysis(product, currentRegion);

  }, 1200);
}
